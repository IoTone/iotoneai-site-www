<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0A0A0F"/>

  <!-- Large icon centered -->
  <rect x="100" y="30" width="200" height="200" fill="none" stroke="#2A2D3A" stroke-width="1.5"/>

  <!-- Grid lines -->
  <line x1="100" y1="80" x2="300" y2="80" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="130" x2="300" y2="130" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="180" x2="300" y2="180" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="150" y1="30" x2="150" y2="230" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="30" x2="200" y2="230" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="250" y1="30" x2="250" y2="230" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>

  <!-- I -->
  <line x1="150" y1="55" x2="150" y2="205" stroke="#00F0FF" stroke-width="4"/>
  <circle cx="150" cy="55" r="10" fill="#00F0FF"/>
  <circle cx="150" cy="130" r="10" fill="#00F0FF"/>
  <circle cx="150" cy="205" r="10" fill="#00F0FF"/>

  <!-- O -->
  <line x1="195" y1="65" x2="275" y2="65" stroke="#00F0FF" stroke-width="4"/>
  <line x1="275" y1="65" x2="275" y2="195" stroke="#00F0FF" stroke-width="4"/>
  <line x1="275" y1="195" x2="195" y2="195" stroke="#00F0FF" stroke-width="4"/>
  <line x1="195" y1="195" x2="195" y2="65" stroke="#00F0FF" stroke-width="4"/>
  <circle cx="195" cy="65" r="10" fill="#00F0FF"/>
  <circle cx="275" cy="65" r="10" fill="#00F0FF"/>
  <circle cx="275" cy="195" r="10" fill="#00F0FF"/>
  <circle cx="195" cy="195" r="10" fill="#00F0FF"/>

  <!-- Cross-connection -->
  <line x1="150" y1="130" x2="195" y2="130" stroke="#00F0FF" stroke-width="2" stroke-dasharray="6,5"/>
  <circle cx="195" cy="130" r="5" fill="#00F0FF"/>

  <!-- IOTONE -->
  <text x="200" y="285" text-anchor="middle" fill="#F0F0F5" font-family="'Eurostile','Orbitron','Exo 2',sans-serif" font-size="42" font-weight="700" letter-spacing="0.12em">IOTONE</text>

  <line x1="120" y1="302" x2="280" y2="302" stroke="#2A2D3A" stroke-width="1"/>

  <text x="200" y="330" text-anchor="middle" fill="#8B8B99" font-family="'Eurostile','Orbitron','Exo 2',sans-serif" font-size="18" letter-spacing="0.5em">JAPAN</text>

  <text x="200" y="370" text-anchor="middle" fill="#4A8B99" font-family="'Inter','DM Sans',sans-serif" font-size="11" letter-spacing="0.15em">UNIFIED HUMAN INTELLIGENCE</text>
</svg>
