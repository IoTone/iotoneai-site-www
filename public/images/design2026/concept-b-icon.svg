<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" fill="#0A0A0F"/>
  <!-- Outer frame -->
  <rect x="10" y="10" width="100" height="100" fill="none" stroke="#2A2D3A" stroke-width="1.5"/>

  <!-- Grid lines (subtle) -->
  <line x1="10" y1="30" x2="110" y2="30" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="50" x2="110" y2="50" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="70" x2="110" y2="70" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="90" x2="110" y2="90" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="10" x2="30" y2="110" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="10" x2="50" y2="110" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="70" y1="10" x2="70" y2="110" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="10" x2="90" y2="110" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>

  <!-- I - vertical line with 3 nodes -->
  <line x1="35" y1="25" x2="35" y2="95" stroke="#00F0FF" stroke-width="2.5"/>
  <circle cx="35" cy="25" r="5" fill="#00F0FF"/>
  <circle cx="35" cy="60" r="5" fill="#00F0FF"/>
  <circle cx="35" cy="95" r="5" fill="#00F0FF"/>

  <!-- O - square circuit path -->
  <line x1="58" y1="30" x2="92" y2="30" stroke="#00F0FF" stroke-width="2.5"/>
  <line x1="92" y1="30" x2="92" y2="90" stroke="#00F0FF" stroke-width="2.5"/>
  <line x1="92" y1="90" x2="58" y2="90" stroke="#00F0FF" stroke-width="2.5"/>
  <line x1="58" y1="90" x2="58" y2="30" stroke="#00F0FF" stroke-width="2.5"/>
  <circle cx="58" cy="30" r="5" fill="#00F0FF"/>
  <circle cx="92" cy="30" r="5" fill="#00F0FF"/>
  <circle cx="92" cy="90" r="5" fill="#00F0FF"/>
  <circle cx="58" cy="90" r="5" fill="#00F0FF"/>

  <!-- Cross-connection from I to O -->
  <line x1="35" y1="60" x2="58" y2="60" stroke="#00F0FF" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="58" cy="60" r="3" fill="#00F0FF"/>
</svg>
