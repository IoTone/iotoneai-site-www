<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <defs>
    <linearGradient id="slA" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FF6B00"/>
      <stop offset="80%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="350" fill="#0A0A0F"/>

  <!-- Large I+O icon centered -->
  <g transform="translate(120,30) skewX(-10)">
    <rect x="0" y="0" width="10" height="140" fill="#FF6B00"/>
    <polygon points="30,0 110,0 130,70 110,140 30,140 10,70" fill="none" stroke="#FF6B00" stroke-width="5"/>
    <circle cx="70" cy="70" r="12" fill="#FF6B00"/>
    <line x1="70" y1="70" x2="35" y2="35" stroke="#FF6B00" stroke-width="2.5"/>
    <line x1="70" y1="70" x2="105" y2="35" stroke="#FF6B00" stroke-width="2.5"/>
    <line x1="70" y1="70" x2="35" y2="105" stroke="#FF6B00" stroke-width="2.5"/>
    <line x1="70" y1="70" x2="105" y2="105" stroke="#FF6B00" stroke-width="2.5"/>
    <circle cx="35" cy="35" r="5" fill="#FF6B00"/>
    <circle cx="105" cy="35" r="5" fill="#FF6B00"/>
    <circle cx="35" cy="105" r="5" fill="#FF6B00"/>
    <circle cx="105" cy="105" r="5" fill="#FF6B00"/>
  </g>

  <!-- Speed line -->
  <line x1="0" y1="195" x2="400" y2="195" stroke="url(#slA)" stroke-width="2"/>

  <!-- IOTONE wordmark -->
  <text x="200" y="245" text-anchor="middle" fill="#FF6B00" font-family="'Eurostile','Orbitron','Exo 2',sans-serif" font-size="42" font-weight="900" letter-spacing="0.12em" font-style="italic">IOTONE</text>

  <!-- Divider -->
  <line x1="130" y1="260" x2="270" y2="260" stroke="#2A2D3A" stroke-width="1"/>

  <!-- JAPAN -->
  <text x="200" y="290" text-anchor="middle" fill="#8B8B99" font-family="'Eurostile','Orbitron','Exo 2',sans-serif" font-size="18" letter-spacing="0.5em">JAPAN</text>

  <!-- Tagline -->
  <text x="200" y="330" text-anchor="middle" fill="#4A8B99" font-family="'Inter','DM Sans',sans-serif" font-size="11" letter-spacing="0.15em" text-transform="uppercase">UNIFIED HUMAN INTELLIGENCE</text>
</svg>
