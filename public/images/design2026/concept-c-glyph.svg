<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="velGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF2D78"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="#0A0A0F"/>

  <!-- Shield/blade outer shape: left side curved, right side angular -->
  <path d="M 60 8 L 98 28 L 105 82 Q 85 108 60 108 Q 35 108 15 82 L 22 28 Z"
        fill="none" stroke="url(#velGrad)" stroke-width="3"/>

  <!-- Inner neural circuit paths -->
  <!-- Top node -->
  <circle cx="60" cy="30" r="5" fill="#FF6B00"/>
  <!-- Mid-left -->
  <circle cx="38" cy="55" r="5" fill="#FF5040"/>
  <!-- Mid-right -->
  <circle cx="82" cy="55" r="5" fill="#FF2D78"/>
  <!-- Bottom -->
  <circle cx="60" cy="82" r="5" fill="#FF2D78"/>
  <!-- Sub nodes -->
  <circle cx="48" cy="40" r="3" fill="#FF6B00" opacity="0.6"/>
  <circle cx="72" cy="40" r="3" fill="#FF2D78" opacity="0.6"/>
  <circle cx="48" cy="70" r="3" fill="#FF2D78" opacity="0.5"/>
  <circle cx="72" cy="70" r="3" fill="#FF6B00" opacity="0.5"/>

  <!-- Primary connections -->
  <line x1="60" y1="30" x2="38" y2="55" stroke="#FF6B00" stroke-width="2"/>
  <line x1="60" y1="30" x2="82" y2="55" stroke="#FF2D78" stroke-width="2"/>
  <line x1="38" y1="55" x2="60" y2="82" stroke="#FF2D78" stroke-width="2"/>
  <line x1="82" y1="55" x2="60" y2="82" stroke="#FF6B00" stroke-width="2"/>

  <!-- Secondary connections -->
  <line x1="60" y1="30" x2="48" y2="40" stroke="#FF6B00" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="30" x2="72" y2="40" stroke="#FF2D78" stroke-width="1.5" opacity="0.5"/>
  <line x1="38" y1="55" x2="48" y2="70" stroke="#FF2D78" stroke-width="1.5" opacity="0.4"/>
  <line x1="82" y1="55" x2="72" y2="70" stroke="#FF6B00" stroke-width="1.5" opacity="0.4"/>
  <line x1="48" y1="70" x2="60" y2="82" stroke="#FF5040" stroke-width="1" opacity="0.4"/>
  <line x1="72" y1="70" x2="60" y2="82" stroke="#FF5040" stroke-width="1" opacity="0.4"/>

  <!-- Cross connections -->
  <line x1="38" y1="55" x2="82" y2="55" stroke="#FF5040" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
</svg>
