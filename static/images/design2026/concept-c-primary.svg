<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="velGradP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF2D78"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="#0A0A0F"/>

  <!-- Shield glyph mark -->
  <g transform="translate(30,10)">
    <path d="M 80 8 L 140 35 L 150 125 Q 120 170 80 170 Q 40 170 10 125 L 20 35 Z"
          fill="none" stroke="url(#velGradP)" stroke-width="3.5"/>

    <!-- Neural nodes -->
    <circle cx="80" cy="42" r="7" fill="#FF6B00"/>
    <circle cx="50" cy="80" r="7" fill="#FF5040"/>
    <circle cx="110" cy="80" r="7" fill="#FF2D78"/>
    <circle cx="80" cy="125" r="7" fill="#FF2D78"/>

    <!-- Sub nodes -->
    <circle cx="63" cy="56" r="4" fill="#FF6B00" opacity="0.6"/>
    <circle cx="97" cy="56" r="4" fill="#FF2D78" opacity="0.6"/>
    <circle cx="63" cy="105" r="4" fill="#FF2D78" opacity="0.5"/>
    <circle cx="97" cy="105" r="4" fill="#FF6B00" opacity="0.5"/>

    <!-- Primary lines -->
    <line x1="80" y1="42" x2="50" y2="80" stroke="#FF6B00" stroke-width="2.5"/>
    <line x1="80" y1="42" x2="110" y2="80" stroke="#FF2D78" stroke-width="2.5"/>
    <line x1="50" y1="80" x2="80" y2="125" stroke="#FF2D78" stroke-width="2.5"/>
    <line x1="110" y1="80" x2="80" y2="125" stroke="#FF6B00" stroke-width="2.5"/>

    <!-- Secondary lines -->
    <line x1="80" y1="42" x2="63" y2="56" stroke="#FF6B00" stroke-width="1.5" opacity="0.5"/>
    <line x1="80" y1="42" x2="97" y2="56" stroke="#FF2D78" stroke-width="1.5" opacity="0.5"/>
    <line x1="50" y1="80" x2="63" y2="105" stroke="#FF2D78" stroke-width="1.5" opacity="0.4"/>
    <line x1="110" y1="80" x2="97" y2="105" stroke="#FF6B00" stroke-width="1.5" opacity="0.4"/>
    <line x1="63" y1="105" x2="80" y2="125" stroke="#FF5040" stroke-width="1" opacity="0.4"/>
    <line x1="97" y1="105" x2="80" y2="125" stroke="#FF5040" stroke-width="1" opacity="0.4"/>

    <!-- Horizontal cross -->
    <line x1="50" y1="80" x2="110" y2="80" stroke="#FF5040" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
  </g>

  <!-- English wordmark -->
  <text x="220" y="90" fill="#F0F0F5" font-family="'Eurostile','Orbitron','Exo 2',sans-serif" font-size="52" font-weight="700" letter-spacing="0.1em">IOTONE</text>

  <!-- Japanese katakana -->
  <text x="220" y="135" fill="#8B8B99" font-family="'Noto Sans JP','M PLUS 1p','Hiragino Kaku Gothic Pro',sans-serif" font-size="22" letter-spacing="0.15em">&#12450;&#12452;&#12458;&#12540;&#12488;&#12540;&#12531; &#12472;&#12515;&#12497;&#12531;</text>

  <!-- Accent line -->
  <line x1="220" y1="152" x2="580" y2="152" stroke="url(#velGradP)" stroke-width="2"/>

  <!-- Tagline -->
  <text x="220" y="175" fill="#4A8B99" font-family="'Inter','DM Sans',sans-serif" font-size="11" letter-spacing="0.15em">UNIFIED HUMAN INTELLIGENCE</text>
</svg>
