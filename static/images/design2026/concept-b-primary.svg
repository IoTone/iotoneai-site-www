<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <rect width="800" height="200" fill="#0A0A0F"/>

  <!-- Icon frame -->
  <rect x="30" y="30" width="140" height="140" fill="none" stroke="#2A2D3A" stroke-width="1.5"/>

  <!-- Grid lines inside frame -->
  <line x1="30" y1="65" x2="170" y2="65" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="100" x2="170" y2="100" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="135" x2="170" y2="135" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="65" y1="30" x2="65" y2="170" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="30" x2="100" y2="170" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>
  <line x1="135" y1="30" x2="135" y2="170" stroke="#2A2D3A" stroke-width="0.5" opacity="0.3"/>

  <!-- I - vertical with nodes -->
  <line x1="70" y1="50" x2="70" y2="150" stroke="#00F0FF" stroke-width="3"/>
  <circle cx="70" cy="50" r="7" fill="#00F0FF"/>
  <circle cx="70" cy="100" r="7" fill="#00F0FF"/>
  <circle cx="70" cy="150" r="7" fill="#00F0FF"/>

  <!-- O - square circuit -->
  <line x1="100" y1="55" x2="150" y2="55" stroke="#00F0FF" stroke-width="3"/>
  <line x1="150" y1="55" x2="150" y2="145" stroke="#00F0FF" stroke-width="3"/>
  <line x1="150" y1="145" x2="100" y2="145" stroke="#00F0FF" stroke-width="3"/>
  <line x1="100" y1="145" x2="100" y2="55" stroke="#00F0FF" stroke-width="3"/>
  <circle cx="100" cy="55" r="7" fill="#00F0FF"/>
  <circle cx="150" cy="55" r="7" fill="#00F0FF"/>
  <circle cx="150" cy="145" r="7" fill="#00F0FF"/>
  <circle cx="100" cy="145" r="7" fill="#00F0FF"/>

  <!-- Cross-connection -->
  <line x1="70" y1="100" x2="100" y2="100" stroke="#00F0FF" stroke-width="2" stroke-dasharray="5,4"/>
  <circle cx="100" cy="100" r="4" fill="#00F0FF"/>

  <!-- IOTONE wordmark -->
  <text x="230" y="108" fill="#F0F0F5" font-family="'Eurostile','Orbitron','Exo 2',sans-serif" font-size="56" font-weight="700" letter-spacing="0.1em">IOTONE</text>

  <!-- Divider line -->
  <line x1="230" y1="125" x2="620" y2="125" stroke="#2A2D3A" stroke-width="1"/>

  <!-- JAPAN -->
  <text x="230" y="150" fill="#8B8B99" font-family="'Eurostile','Orbitron','Exo 2',sans-serif" font-size="18" letter-spacing="0.5em">JAPAN</text>
</svg>
