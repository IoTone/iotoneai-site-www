<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="speedLineW" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0"/>
      <stop offset="15%" stop-color="#FF6B00" stop-opacity="1"/>
      <stop offset="85%" stop-color="#FF6B00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="#0A0A0F"/>

  <!-- Speed lines background -->
  <line x1="0" y1="95" x2="800" y2="95" stroke="url(#speedLineW)" stroke-width="1.5" opacity="0.3"/>

  <!-- I -->
  <g transform="translate(95,35) skewX(-12)">
    <rect x="0" y="0" width="8" height="100" fill="#FF6B00"/>
    <rect x="16" y="0" width="28" height="16" fill="#F0F0F5"/>
    <rect x="16" y="42" width="28" height="16" fill="#F0F0F5"/>
    <rect x="16" y="84" width="28" height="16" fill="#F0F0F5"/>
  </g>

  <!-- O -->
  <g transform="translate(170,35) skewX(-12)">
    <polygon points="20,0 70,0 85,50 70,100 20,100 5,50" fill="none" stroke="#F0F0F5" stroke-width="5"/>
    <circle cx="45" cy="50" r="8" fill="#FF6B00"/>
    <line x1="45" y1="50" x2="20" y2="30" stroke="#F0F0F5" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="50" x2="70" y2="30" stroke="#F0F0F5" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="50" x2="20" y2="70" stroke="#F0F0F5" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="50" x2="70" y2="70" stroke="#F0F0F5" stroke-width="1.5" opacity="0.5"/>
    <circle cx="20" cy="30" r="3" fill="#F0F0F5" opacity="0.5"/>
    <circle cx="70" cy="30" r="3" fill="#F0F0F5" opacity="0.5"/>
    <circle cx="20" cy="70" r="3" fill="#F0F0F5" opacity="0.5"/>
    <circle cx="70" cy="70" r="3" fill="#F0F0F5" opacity="0.5"/>
  </g>

  <!-- T -->
  <g transform="translate(285,35) skewX(-12)">
    <rect x="0" y="0" width="75" height="16" fill="#F0F0F5"/>
    <rect x="28" y="0" width="18" height="100" fill="#F0F0F5"/>
  </g>

  <!-- O2 -->
  <g transform="translate(375,35) skewX(-12)">
    <polygon points="20,0 70,0 85,50 70,100 20,100 5,50" fill="none" stroke="#F0F0F5" stroke-width="5"/>
    <circle cx="45" cy="50" r="8" fill="#FF6B00"/>
    <line x1="45" y1="50" x2="25" y2="35" stroke="#F0F0F5" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="50" x2="65" y2="35" stroke="#F0F0F5" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="50" x2="25" y2="65" stroke="#F0F0F5" stroke-width="1.5" opacity="0.5"/>
    <line x1="45" y1="50" x2="65" y2="65" stroke="#F0F0F5" stroke-width="1.5" opacity="0.5"/>
    <circle cx="25" cy="35" r="3" fill="#F0F0F5" opacity="0.5"/>
    <circle cx="65" cy="35" r="3" fill="#F0F0F5" opacity="0.5"/>
    <circle cx="25" cy="65" r="3" fill="#F0F0F5" opacity="0.5"/>
    <circle cx="65" cy="65" r="3" fill="#F0F0F5" opacity="0.5"/>
  </g>

  <!-- N -->
  <g transform="translate(490,35) skewX(-12)">
    <rect x="0" y="0" width="18" height="100" fill="#F0F0F5"/>
    <polygon points="18,0 18,20 52,100 70,100 70,80 36,0" fill="#F0F0F5"/>
    <rect x="52" y="0" width="18" height="100" fill="#F0F0F5"/>
  </g>

  <!-- E -->
  <g transform="translate(590,35) skewX(-12)">
    <rect x="0" y="0" width="18" height="100" fill="#F0F0F5"/>
    <rect x="0" y="0" width="60" height="16" fill="#F0F0F5"/>
    <rect x="0" y="42" width="50" height="16" fill="#F0F0F5"/>
    <rect x="0" y="84" width="60" height="16" fill="#F0F0F5"/>
  </g>

  <!-- JAPAN -->
  <text x="400" y="168" text-anchor="middle" fill="#8B8B99" font-family="'Eurostile','Orbitron','Exo 2',sans-serif" font-size="16" letter-spacing="0.6em">JAPAN</text>

  <!-- Speed line -->
  <line x1="0" y1="148" x2="800" y2="148" stroke="url(#speedLineW)" stroke-width="2"/>
</svg>
