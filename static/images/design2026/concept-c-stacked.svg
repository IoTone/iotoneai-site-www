<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <defs>
    <linearGradient id="velGradS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF2D78"/>
    </linearGradient>
  </defs>
  <rect width="400" height="450" fill="#0A0A0F"/>

  <!-- Large centered glyph -->
  <g transform="translate(110,15)">
    <path d="M 90 10 L 165 42 L 175 148 Q 140 200 90 200 Q 40 200 5 148 L 15 42 Z"
