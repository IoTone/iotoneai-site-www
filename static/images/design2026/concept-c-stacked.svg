    <circle cx="90" cy="48" r="9" fill="#FF6B00"/>
    <circle cx="55" cy="95" r="9" fill="#FF5040"/>
    <circle cx="125" cy="95" r="9" fill="#FF2D78"/>
    <circle cx="90" cy="148" r="9" fill="#FF2D78"/>

    <circle cx="70" cy="66" r="5" fill="#FF6B00" opacity="0.6"/>
    <circle cx="110" cy="66" r="5" fill="#FF2D78" opacity="0.6"/>
    <circle cx="70" cy="125" r="5" fill="#FF2D78" opacity="0.5"/>
    <circle cx="110" cy="125" r="5" fill="#FF6B00" opacity="0.5"/>

    <line x1="90" y1="48" x2="55" y2="95" stroke="#FF6B00" stroke-width="3"/>
    <line x1="90" y1="48" x2="125" y2="95" stroke="#FF2D78" stroke-width="3"/>
    <line x1="55" y1="95" x2="90" y2="148" stroke="#FF2D78" stroke-width="3"/>
    <line x1="125" y1="95" x2="90" y2="148" stroke="#FF6B00" stroke-width="3"/>

