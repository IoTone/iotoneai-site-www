    <line x1="90" y1="48" x2="110" y2="66" stroke="#FF2D78" stroke-width="2" opacity="0.5"/>
    <line x1="55" y1="95" x2="70" y2="125" stroke="#FF2D78" stroke-width="2" opacity="0.4"/>
    <line x1="125" y1="95" x2="110" y2="125" stroke="#FF6B00" stroke-width="2" opacity="0.4"/>
    <line x1="70" y1="125" x2="90" y2="148" stroke="#FF5040" stroke-width="1.5" opacity="0.4"/>
    <line x1="110" y1="125" x2="90" y2="148" stroke="#FF5040" stroke-width="1.5" opacity="0.4"/>

    <line x1="55" y1="95" x2="125" y2="95" stroke="#FF5040" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
