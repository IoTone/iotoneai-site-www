  <text x="200" y="290" text-anchor="middle" fill="#F0F0F5" font-family="'Eurostile','Orbitron','Exo 2',sans-serif" font-size="42" font-weight="700" letter-spacing="0.12em">IOTONE</text>

  <!-- Katakana -->
  <text x="200" y="330" text-anchor="middle" fill="#8B8B99" font-family="'Noto Sans JP','M PLUS 1p','Hiragino Kaku Gothic Pro',sans-serif" font-size="18" letter-spacing="0.15em">&#12450;&#12452;&#12458;&#12540;&#12488;&#12540;&#12531; &#12472;&#12515;&#12497;&#12531;</text>

  <!-- Gradient divider -->
  <line x1="120" y1="350" x2="280" y2="350" stroke="#2A2D3A" stroke-width="1"/>

  <!-- Tagline -->
  <text x="200" y="380" text-anchor="middle" fill="#4A8B99" font-family="'Inter','DM Sans',sans-serif" font-size="11" letter-spacing="0.15em">UNIFIED HUMAN INTELLIGENCE</text>

  <!-- Location -->
  <text x="200" y="420" text-anchor="middle" fill="#2A2D3A" font-family="'Inter','DM Sans',sans-serif" font-size="9" letter-spacing="0.1em">FUKUOKA, JAPAN</text>
