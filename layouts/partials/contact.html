{{ $md := .Site.Params.body_is_markdown | default false }}

{{ with .Site.Params.contact }}
{{ if .enable }}
<section id="contact" class="wrapper style5">
  <div class="inner">
    <header class="major">
      <h2>{{ .title }}</h2>
      {{ partial "body_text.html" (dict "context" . "md" $md) }}
    </header>
    <form id="contact-form"
          method="post"
          data-endpoint="{{ $.Site.Params.grist.functionEndpoint | default "/.netlify/functions/contact" }}"
          data-success-message="{{ .message_sent }}"
          data-error-message="{{ .message_error | default "An error occurred. Please try again." }}">
      <div class="row gtr-uniform">
        <input type="hidden" name="subject" value="{{ .subject }}" />
        <!-- Honeypot field for spam protection -->
        <div class="ohnohoney">
          <input type="text" name="website" id="website" tabindex="-1" autocomplete="off" />
        </div>
        <div class="col-6 col-12-xsmall">
          <input type="text" name="name" id="name" value="" placeholder="{{ i18n "name" }}" required />
        </div>
        <div class="col-6 col-12-xsmall">
          <input type="email" name="email" id="email" value="" placeholder="{{ i18n "email" }}" required />
        </div>
        <div class="col-12">
          <textarea name="message" id="message" placeholder="{{ i18n "yourmessage" }}" rows="6" required></textarea>
        </div>
        <div class="col-12">
          <ul class="actions">
            <li><input type="submit" value="{{ i18n "send" }}" class="primary" /></li>
            <li><input type="reset" value="{{ i18n "reset" }}" /></li>
          </ul>
        </div>
        <div class="col-12">
          <div id="form-status" class="form-status" aria-live="polite"></div>
        </div>
      </div>
    </form>
  </div>
</section>
{{ end }}
{{ end }}
